<div class="simular-wrap">
    <form action="submit" class="form-row" [formGroup]="form">
        <div>
            <mat-form-field appearance="outline" class="example-full-width">
              <mat-label>Id do Cliente</mat-label>
              <input  formControlName="clientId" matInput inputmode="numeric" placeholder="Ex. 0000">
            </mat-form-field>
        </div>
        <div>
            <mat-form-field appearance="outline" class="example-full-width">
              <mat-label>Valor</mat-label>
              <input  formControlName="value" matInput placeholder="Ex. 0000,00">
            </mat-form-field>
        </div>
        <div>
            <mat-form-field appearance="outline" class="example-full-width">
              <mat-label>Prazo (em meses)</mat-label>
              <input formControlName="termMonths" matInput placeholder="Ex. 12">
            </mat-form-field>
        </div>
        <div>
            <mat-form-field appearence="outline">
              <mat-label>Selecionar Produto</mat-label>
              <mat-select formControlName="product">
                @for (product of products; track product) {
                  <mat-option [value]="product.value">{{product.viewValue}}</mat-option>
                }
              </mat-select>
            </mat-form-field>
        </div>
        <button mat-flat-button [disabled]="form.invalid" type="submit" (click)="gerarSimulacao(form.get('clientId')?.value)">Gerar Simulação</button>
    </form> 
</div>
